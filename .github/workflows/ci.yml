name: CI

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Unit tests
        run: PYTHONPATH=. pytest tests/ -q
      - name: Preflight deps only
        run: PYTHONPATH=. python -m rag.preflight --track hk_cde --skip-ollama || true

  # Retrieval evals need local Chroma indexes; run when artifact present.
  retrieval-eval:
    runs-on: ubuntu-latest
    if: false  # enable after publishing index artifacts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python scripts/run_eval_suite.py --skip-vs
